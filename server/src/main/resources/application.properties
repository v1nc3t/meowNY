# PostgreSQL Connectivity Settings
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meowny_db}
spring.datasource.username=${DB_USER:postgres}

# Inject the sensitive password from an environment variable with NO hardcoded default
spring.datasource.password=${DB_PASSWORD}

# Hibernate Dialect Optimization for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Strategy for table (re-)generation
spring.jpa.hibernate.ddl-auto=create-drop

# Show auto-generated SQL commands (Great for debugging)
spring.jpa.show-sql=false

