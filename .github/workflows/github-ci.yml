name: Java CI with Maven

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: maven:3.9.11-amazoncorretto-25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK and cache
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          cache: 'maven'

      - name: Install System Dependencies
        run: |
          yum install -y tar gzip libXxf86vm libXrender libXtst libXi glib2 gtk3 alsa-lib

      - name: Build with Maven
        run: mvn -B -ntp install -T 1C -DskipTests -o